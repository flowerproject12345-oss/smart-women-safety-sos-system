{% extends "base.html" %} {% block content %}
<section class="hero-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5" data-aos="fade-up">
        <div class="card border-0 shadow-lg rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i
                class="fas fa-shield-alt fa-3x"
                style="
                  background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
                  -webkit-background-clip: text;
                  -webkit-text-fill-color: transparent;
                "
              ></i>
              <h3 class="mt-2 fw-bold">Welcome to SheShield</h3>
              <p class="text-muted">Login to your account</p>
            </div>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0"
                    ><i class="fas fa-envelope"></i
                  ></span>
                  <input
                    type="email"
                    id="email"
                    class="form-control border-0 bg-light"
                    placeholder="Enter your email"
                    required
                  />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0"
                    ><i class="fas fa-lock"></i
                  ></span>
                  <input
                    type="password"
                    id="password"
                    class="form-control border-0 bg-light"
                    placeholder="Enter your password"
                    required
                  />
                </div>
              </div>

              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember" />
                <label class="form-check-label">Remember me</label>
                <a
                  href="#"
                  class="float-end text-decoration-none"
                  style="color: #ff6b6b"
                  >Forgot Password?</a
                >
              </div>

              <button type="submit" class="btn btn-primary-custom w-100">
                <i class="fas fa-sign-in-alt"></i> Login
              </button>
            </form>

            <hr class="my-4" />

            <div class="text-center">
              <p class="mb-2">Don't have an account?</p>
              <button
                class="btn btn-outline-custom w-100"
                onclick="showSignup()"
              >
                <i class="fas fa-user-plus"></i> Create New Account
              </button>
            </div>

            <div class="text-center mt-4">
              <p class="small text-muted">
                By continuing, you agree to our
                <a href="#" style="color: #ff6b6b">Terms</a> and
                <a href="#" style="color: #ff6b6b">Privacy Policy</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Signup Modal -->
<div class="modal fade" id="signupModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold">Create Account</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
        ></button>
      </div>
      <div class="modal-body">
        <form id="signupForm">
          <div class="mb-3">
            <label>Full Name</label>
            <input type="text" id="fullname" class="form-control" required />
          </div>
          <div class="mb-3">
            <label>Email Address</label>
            <input
              type="email"
              id="signupEmail"
              class="form-control"
              required
            />
          </div>
          <div class="mb-3">
            <label>Phone Number</label>
            <input type="tel" id="phone" class="form-control" required />
          </div>
          <div class="mb-3">
            <label>Password</label>
            <input
              type="password"
              id="signupPassword"
              class="form-control"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary-custom w-100">
            Sign Up
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  function showSignup() {
    new bootstrap.Modal(document.getElementById("signupModal")).show();
  }

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    // Login logic here
    window.location.href = "/outlook";
  });

  document
    .getElementById("signupForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault();
      alert("Account created successfully! Please login.");
      bootstrap.Modal.getInstance(
        document.getElementById("signupModal"),
      ).hide();
    });
</script>
{% endblock %}
