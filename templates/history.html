{% extends "base.html" %} {% block content %}
<div class="container mt-4">
  <h2><i class="fas fa-history"></i> Alert History</h2>
  <p class="text-muted">View all your past SOS alerts and actions.</p>

  <div class="row">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header bg-dark text-white">
          <h5><i class="fas fa-list"></i> SOS Alert History</h5>
        </div>
        <div class="card-body" id="historyList">
          <div class="text-center py-5">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>Loading history...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-4">
    <div class="col-md-12">
      <div class="card">
        <div class="card-header bg-secondary text-white">
          <h5><i class="fas fa-clipboard-list"></i> Action Log</h5>
        </div>
        <div class="card-body" id="actionLog">
          <div class="text-center py-5">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>Loading actions...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Load SOS history
  async function loadSOSHistory() {
    try {
      const response = await fetch("/api/sos/recent");
      const alerts = await response.json();

      const historyList = document.getElementById("historyList");

      if (alerts.length === 0) {
        historyList.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-check-circle fa-3x text-success"></i>
                        <p class="mt-2">No SOS alerts triggered yet. Stay safe! 🛡️</p>
                    </div>
                `;
        return;
      }

      historyList.innerHTML = alerts
        .map(
          (alert) => `
                <div class="card mb-3 ${alert.status === "active" ? "border-danger" : "border-success"}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-1">
                                    <i class="fas fa-exclamation-triangle ${alert.status === "active" ? "text-danger" : "text-success"}"></i>
                                    SOS Alert - ${new Date(alert.timestamp).toLocaleString()}
                                </h6>
                                <p class="mb-1 small">
                                    <i class="fas fa-map-marker-alt"></i> 
                                    ${alert.address || `${alert.latitude}, ${alert.longitude}`}
                                </p>
                                <span class="badge ${alert.status === "active" ? "bg-danger" : "bg-success"}">
                                    ${alert.status === "active" ? "Active" : "Resolved"}
                                </span>
                                ${alert.resolved_at ? `<small class="text-muted ms-2">Resolved: ${new Date(alert.resolved_at).toLocaleString()}</small>` : ""}
                            </div>
                            ${
                              alert.status === "active"
                                ? `
                                <button class="btn btn-sm btn-success" onclick="resolveAlert(${alert.id})">
                                    <i class="fas fa-check"></i> Mark Safe
                                </button>
                            `
                                : ""
                            }
                        </div>
                    </div>
                </div>
            `,
        )
        .join("");
    } catch (error) {
      console.error("Error loading history:", error);
      document.getElementById("historyList").innerHTML = `
                <div class="alert alert-danger">
                    Failed to load history. Please refresh the page.
                </div>
            `;
    }
  }

  // Load action log
  async function loadActionLog() {
    try {
      const response = await fetch("/api/user/history?limit=20");
      const actions = await response.json();

      const actionLog = document.getElementById("actionLog");

      if (actions.length === 0) {
        actionLog.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-info-circle fa-3x text-muted"></i>
                        <p class="mt-2">No actions recorded yet.</p>
                    </div>
                `;
        return;
      }

      const actionIcons = {
        sos_triggered: "🚨",
        sos_resolved: "✅",
        contact_added: "👥",
        contact_deleted: "🗑️",
        safe_zone_added: "🏠",
        safe_zone_deleted: "🗑️",
        tracking_started: "📍",
        tracking_stopped: "⏹️",
        fake_call_made: "📞",
      };

      actionLog.innerHTML = `
                <div class="list-group">
                    ${actions
                      .map(
                        (action) => `
                        <div class="list-group-item">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="me-2">${actionIcons[action.action_type] || "📝"}</span>
                                    <strong>${action.action_type.replace(/_/g, " ").toUpperCase()}</strong>
                                    ${action.action_details ? `<br><small class="text-muted">${action.action_details.substring(0, 100)}</small>` : ""}
                                </div>
                                <small class="text-muted">${new Date(action.timestamp).toLocaleString()}</small>
                            </div>
                        </div>
                    `,
                      )
                      .join("")}
                </div>
            `;
    } catch (error) {
      console.error("Error loading action log:", error);
      document.getElementById("actionLog").innerHTML = `
                <div class="alert alert-danger">
                    Failed to load action log.
                </div>
            `;
    }
  }

  // Resolve alert
  async function resolveAlert(alertId) {
    if (
      confirm(
        "Mark this alert as resolved? This will notify that you are safe.",
      )
    ) {
      try {
        const response = await fetch(`/api/sos/resolve/${alertId}`, {
          method: "POST",
        });

        const result = await response.json();

        if (result.success) {
          alert("✅ Alert marked as resolved!");
          loadSOSHistory();
        } else {
          alert("❌ Failed to resolve alert.");
        }
      } catch (error) {
        console.error("Error:", error);
        alert("❌ Network error. Please try again.");
      }
    }
  }

  // Load data on page load
  loadSOSHistory();
  loadActionLog();
</script>
{% endblock %}
