{% extends "base.html" %} {% block content %}
<div class="container mt-4">
  <h2><i class="fas fa-address-book"></i> Emergency Contacts</h2>
  <p class="text-muted">
    These contacts will be notified when you trigger an SOS alert.
  </p>

  <div class="alert alert-info">
    <i class="fas fa-info-circle"></i> You can add up to 10 emergency contacts.
    They will receive alerts with your location.
  </div>

  <div class="row">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header bg-danger text-white">
          <h5><i class="fas fa-plus"></i> Add New Contact</h5>
        </div>
        <div class="card-body">
          <form id="addContactForm">
            <div class="mb-3">
              <label class="form-label">Name *</label>
              <input
                type="text"
                id="contactName"
                class="form-control"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Phone Number *</label>
              <input
                type="tel"
                id="contactPhone"
                class="form-control"
                required
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" id="contactEmail" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label">Relationship</label>
              <select id="contactRelation" class="form-control">
                <option>Mother</option>
                <option>Father</option>
                <option>Sister</option>
                <option>Brother</option>
                <option>Friend</option>
                <option>Spouse</option>
                <option>Other</option>
              </select>
            </div>
            <button type="submit" class="btn btn-danger w-100">
              <i class="fas fa-save"></i> Add Contact
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card">
        <div class="card-header bg-dark text-white">
          <h5><i class="fas fa-list"></i> Your Contacts</h5>
        </div>
        <div class="card-body" id="contactsList">
          <div class="text-center py-5">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>Loading contacts...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // Load contacts from server
  async function loadContacts() {
    try {
      const response = await fetch("/api/contacts/get");
      const contacts = await response.json();

      const contactsList = document.getElementById("contactsList");

      if (contacts.length === 0) {
        contactsList.innerHTML = `
                    <div class="text-center py-5">
                        <i class="fas fa-address-book fa-3x text-muted"></i>
                        <p class="mt-2">No contacts added yet. Add your first emergency contact!</p>
                    </div>
                `;
        return;
      }

      contactsList.innerHTML = contacts
        .map(
          (contact) => `
                <div class="card mb-2">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1">
                                    <i class="fas fa-user-circle"></i> ${escapeHtml(contact.name)}
                                    ${contact.is_primary ? '<span class="badge bg-primary ms-2">Primary</span>' : ""}
                                </h6>
                                <p class="mb-0 small">
                                    <i class="fas fa-phone"></i> ${escapeHtml(contact.phone)}<br>
                                    ${contact.email ? `<i class="fas fa-envelope"></i> ${escapeHtml(contact.email)}` : ""}
                                    ${contact.relationship ? `<br><i class="fas fa-heart"></i> ${escapeHtml(contact.relationship)}` : ""}
                                </p>
                            </div>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteContact(${contact.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `,
        )
        .join("");
    } catch (error) {
      console.error("Error loading contacts:", error);
      document.getElementById("contactsList").innerHTML = `
                <div class="alert alert-danger">
                    Failed to load contacts. Please refresh the page.
                </div>
            `;
    }
  }

  // Add new contact
  document
    .getElementById("addContactForm")
    .addEventListener("submit", async (e) => {
      e.preventDefault();

      const contact = {
        name: document.getElementById("contactName").value,
        phone: document.getElementById("contactPhone").value,
        email: document.getElementById("contactEmail").value,
        relationship: document.getElementById("contactRelation").value,
      };

      try {
        const response = await fetch("/api/contacts/add", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(contact),
        });

        const result = await response.json();

        if (result.success) {
          alert("✅ Contact added successfully!");
          document.getElementById("addContactForm").reset();
          loadContacts();
        } else {
          alert("❌ Failed to add contact: " + result.message);
        }
      } catch (error) {
        console.error("Error:", error);
        alert("❌ Network error. Please try again.");
      }
    });

  // Delete contact
  async function deleteContact(contactId) {
    if (confirm("Are you sure you want to delete this contact?")) {
      try {
        const response = await fetch(`/api/contacts/delete/${contactId}`, {
          method: "DELETE",
        });

        const result = await response.json();

        if (result.success) {
          alert("✅ Contact deleted successfully!");
          loadContacts();
        } else {
          alert("❌ Failed to delete contact.");
        }
      } catch (error) {
        console.error("Error:", error);
        alert("❌ Network error. Please try again.");
      }
    }
  }

  // Helper function to escape HTML
  function escapeHtml(text) {
    if (!text) return "";
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  // Load contacts on page load
  loadContacts();
</script>
{% endblock %}
